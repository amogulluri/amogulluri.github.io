<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Akilesh Mogulluri | Blogs</title>
  <style>
    :root {
      --bg: #f3f6fb;
      --card: #ffffff;
      --text: #181818;
      --muted: #5c5e66;
      --accent: #0176d3;
      --accent-strong: #014486;
      --accent-soft: rgba(1, 118, 211, 0.08);
      --border: #e5e9ee;
      --shadow: 0 2px 12px rgba(3, 45, 96, 0.08);
    }
    [data-theme="dark"] {
      --bg: #dceaf6;
      --card: #f5f9fd;
      --text: #03234b;
      --muted: #3a5577;
      --accent: #014486;
      --accent-strong: #032d60;
      --accent-soft: rgba(1, 68, 134, 0.12);
      --border: #b9d0e5;
      --shadow: 0 2px 16px rgba(3, 45, 96, 0.18);
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: "Salesforce Sans", "Avenir Next", "Helvetica Neue", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 0;
      transition: background 0.3s ease, color 0.3s ease;
    }
    nav {
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: saturate(180%) blur(10px);
      background: color-mix(in srgb, var(--bg) 85%, transparent);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner {
      max-width: 920px;
      margin: 0 auto;
      padding: 0.85rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .nav-brand {
      font-weight: 600;
      color: var(--accent);
      text-decoration: none;
      font-size: 0.95rem;
    }
    .nav-links {
      display: flex;
      gap: 1.25rem;
      align-items: center;
    }
    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--accent); }
    .nav-links a.active { color: var(--accent); font-weight: 600; }
    .theme-toggle {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 999px;
      width: 32px;
      height: 32px;
      cursor: pointer;
      color: var(--text);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.95rem;
      padding: 0;
      transition: border-color 0.2s, transform 0.2s;
    }
    .theme-toggle:hover { border-color: var(--accent); transform: rotate(15deg); }
    main {
      max-width: 920px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 4rem;
    }
    section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      margin-bottom: 1.5rem;
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    section.visible { opacity: 1; transform: none; }
    h1 {
      color: var(--accent);
      margin: 0 0 0.35rem;
      font-size: 2rem;
    }
    p { line-height: 1.65; color: var(--text); margin: 0 0 1rem; }
    p:last-child { margin-bottom: 0; }
    .blog-empty {
      text-align: center;
      padding: 2.5rem 1rem;
      color: var(--muted);
    }
    .blog-empty .icon {
      font-size: 2.4rem;
      margin-bottom: 0.75rem;
      display: block;
    }
    footer {
      text-align: center;
      color: var(--muted);
      font-size: 0.82rem;
      padding: 2rem 1rem;
    }
    @media (max-width: 600px) {
      .nav-links a:not(.nav-cta) { display: none; }
      h1 { font-size: 1.6rem; }
      section { padding: 1.5rem; }
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a href="/" class="nav-brand">Akilesh Mogulluri</a>
      <div class="nav-links">
        <a href="/#about">About</a>
        <a href="/#experience">Experience</a>
        <a href="/blogs/" class="active">Blogs</a>
        <a href="/#certifications">Certifications</a>
        <a href="/#skills">Skills</a>
        <a href="/#contact">Contact</a>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌙</button>
      </div>
    </div>
  </nav>

  <main>
    <section>
      <h1>Blogs</h1>
      <div class="blog-empty">
        <span class="icon">✍️</span>
        <p>Posts coming soon.</p>
      </div>
    </section>
  </main>

  <footer>Sydney, NSW · Australia</footer>

  <script>
    const root = document.documentElement;
    const stored = localStorage.getItem('theme');
    if (stored) root.setAttribute('data-theme', stored);
    else if (window.matchMedia('(prefers-color-scheme: dark)').matches) root.setAttribute('data-theme', 'dark');

    const toggle = document.getElementById('themeToggle');
    const updateToggleIcon = () => {
      toggle.textContent = root.getAttribute('data-theme') === 'dark' ? '☀️' : '🌙';
    };
    updateToggleIcon();
    toggle.addEventListener('click', () => {
      const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      root.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      updateToggleIcon();
    });

    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.12 });
    document.querySelectorAll('section').forEach((s) => observer.observe(s));
  </script>
</body>
</html>
